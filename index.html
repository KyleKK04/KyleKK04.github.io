<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="朱绪达 KyleKK 的个人网站，记录游戏研发、Unity 项目、技术博客和学习复盘。">
  <title>朱绪达 KyleKK | Gameplay Developer</title>
  <meta property="og:title" content="朱绪达 KyleKK | Gameplay Developer">
  <meta property="og:description" content="软件工程本科在读，快手游戏研发部实习中。专注 Unity 玩法开发、系统设计与游戏原型。">
  <meta property="og:url" content="https://kylekk.com/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="styles/main.css?v=20260611-project-live">
  <style>
    body {
      background: #050505;
    }

    .nav {
      padding: 22px 0;
    }

    .nav-links {
      gap: 26px;
    }

    .hero {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(360px, 0.72fr);
      gap: 64px;
      align-items: center;
      min-height: calc(100vh - 86px);
      padding: 58px 0 82px;
    }

    .hero::before {
      content: "";
      position: absolute;
      left: clamp(-24px, -3vw, -12px);
      top: 18%;
      width: min(48vw, 560px);
      height: 58%;
      border-left: 1px solid rgba(83, 216, 140, 0.18);
      border-top: 1px solid rgba(83, 216, 140, 0.08);
      opacity: 0.7;
      pointer-events: none;
    }

    .hero > *,
    .module > *,
    .project-highlight-list > *,
    .profile-grid > *,
    .notes-grid > *,
    .contact-layout > * {
      min-width: 0;
    }

    .hero-kicker {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 9px;
      margin-bottom: 26px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .hero-kicker span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      background: rgba(83, 216, 140, 0.06);
      border: 1px solid rgba(83, 216, 140, 0.18);
      border-radius: var(--radius-sm);
    }

    .hero-title {
      max-width: 860px;
      font-size: clamp(42px, 6.2vw, 84px);
      line-height: 0.98;
      letter-spacing: -0.035em;
      font-weight: 800;
    }

    .hero-title span {
      display: block;
    }

    .hero-title .highlight {
      color: var(--primary);
      text-shadow: 0 0 34px rgba(83, 216, 140, 0.12);
    }

    .hero-text {
      max-width: 650px;
      margin-top: 24px;
      color: var(--text-dim);
      font-size: 16px;
      line-height: 1.85;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 32px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button.primary {
      color: #04170e;
      background: var(--primary);
      border-color: var(--primary);
    }

    .button.primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .button.secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.02);
    }

    .button.secondary:hover {
      border-color: var(--border-hover);
    }

    .hero-readout {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      max-width: 650px;
      margin-top: 30px;
    }

    .readout-item {
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(13, 17, 16, 0.46);
    }

    .readout-item strong {
      display: block;
      color: var(--primary);
      font-size: 17px;
      line-height: 1.15;
    }

    .readout-item span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .profile-panel {
      position: relative;
      isolation: isolate;
      overflow: hidden;
    }

    .profile-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(135deg, rgba(83, 216, 140, 0.1), transparent 38%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 42%);
      opacity: 0.9;
    }

    .avatar {
      display: grid;
      place-items: center;
      width: 96px;
      height: 96px;
      margin-bottom: 22px;
      color: #04170e;
      background:
        linear-gradient(135deg, rgba(83, 216, 140, 1), rgba(111, 183, 214, 0.82));
      border-radius: var(--radius);
      font-size: 36px;
      font-weight: 900;
      box-shadow: 0 18px 48px rgba(83, 216, 140, 0.14);
    }

    .profile-body h2 {
      margin-bottom: 8px;
      font-size: 24px;
      font-weight: 800;
    }

    .profile-body p {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.7;
    }

    .status-list {
      display: grid;
      gap: 10px;
      margin-top: 26px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
    }

    .status-row {
      display: grid;
      grid-template-columns: minmax(64px, 92px) minmax(0, 1fr);
      gap: 12px;
      color: var(--text-dim);
      font-size: 13px;
    }

    .status-row > * {
      min-width: 0;
    }

    .status-row strong {
      color: var(--primary);
      font-weight: 700;
    }

    .status-row span {
      overflow-wrap: anywhere;
    }

    main {
      display: grid;
      gap: 28px;
      padding-bottom: 54px;
    }

    .module {
      scroll-margin-top: 96px;
      padding: 56px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .module.reveal {
      opacity: 1;
      transform: none;
    }

    .module-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 26px;
    }

    .module-kicker {
      display: block;
      margin-bottom: 8px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .module-title {
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.08;
      letter-spacing: -0.02em;
      font-weight: 800;
    }

    .module-copy {
      max-width: 560px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .project-highlight-list {
      display: grid;
      grid-template-columns: 1.08fr repeat(2, minmax(0, 0.72fr));
      gap: 14px;
      align-items: stretch;
    }

    .project-tile {
      display: block;
      min-height: 100%;
      overflow: hidden;
      background: rgba(13, 17, 16, 0.7);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: transform 0.22s ease, border-color 0.22s ease, background 0.22s ease;
    }

    .project-tile:hover {
      transform: translateY(-2px);
      border-color: var(--border-hover);
      background: rgba(18, 26, 22, 0.84);
    }

    .project-tile.featured {
      grid-row: span 2;
    }

    .project-cover {
      display: grid;
      place-items: center;
      aspect-ratio: 16 / 9;
    }

    .project-tile.featured .project-cover {
      aspect-ratio: 16 / 10;
    }

    .project-tile .project-cover.cover-fit-contain {
      aspect-ratio: auto;
      min-height: 0;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(83, 216, 140, 0.05), transparent 42%),
        #050505;
    }

    .project-tile .project-cover.cover-fit-contain img {
      width: 100%;
      height: auto;
      max-width: 100%;
      max-height: none;
      object-fit: contain;
      object-position: center;
    }

    .project-tile.featured .project-cover.cover-fit-contain {
      min-height: 320px;
    }

    .project-info {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      padding: 18px;
    }

    .project-info h3 {
      font-size: 20px;
      line-height: 1.22;
      overflow-wrap: anywhere;
    }

    .project-tile.featured .project-info h3 {
      font-size: 28px;
    }

    .project-info p {
      margin-top: 9px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .project-cta-row {
      margin-top: auto;
      padding-top: 16px;
    }

    .project-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 14px;
      color: #04170e;
      background: var(--primary);
      border: 1px solid var(--primary);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .project-cta:hover {
      transform: translateY(-1px);
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .project-cta.disabled {
      color: var(--muted);
      background: rgba(255, 255, 255, 0.03);
      border-color: var(--border);
      cursor: default;
      pointer-events: none;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 18px;
    }

    .timeline {
      display: grid;
      gap: 12px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 22px;
      padding: 18px 0;
      border-top: 1px solid var(--border);
    }

    .timeline-item:first-child {
      border-top-color: rgba(83, 216, 140, 0.2);
    }

    .timeline-item time {
      color: var(--primary);
      font-size: 13px;
      font-weight: 800;
    }

    .timeline-item h3 {
      margin-bottom: 5px;
      font-size: 19px;
      line-height: 1.25;
    }

    .timeline-item p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .skill-board {
      display: grid;
      gap: 12px;
    }

    .skill-group {
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(13, 17, 16, 0.58);
    }

    .skill-group-label {
      display: block;
      margin-bottom: 12px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .note-card {
      display: block;
      min-height: 220px;
      padding: 20px;
      background: rgba(13, 17, 16, 0.68);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: transform 0.22s ease, border-color 0.22s ease, background 0.22s ease;
    }

    .note-card:hover {
      transform: translateY(-2px);
      border-color: var(--border-hover);
      background: rgba(18, 26, 22, 0.86);
    }

    .note-card small {
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
    }

    .note-card h3 {
      margin: 12px 0 8px;
      font-size: 20px;
      line-height: 1.25;
    }

    .note-card p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .note-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 16px;
    }

    @media (max-width: 980px) {
      .hero,
      .profile-grid,
      .contact-layout {
        grid-template-columns: 1fr;
      }

      .hero {
        min-height: auto;
        gap: 32px;
        padding-top: 40px;
      }

      .project-highlight-list,
      .notes-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .project-tile.featured {
        grid-column: span 2;
        grid-row: auto;
      }
    }

    @media (max-width: 640px) {
      .nav-links {
        gap: 14px;
      }

      .hero {
        padding-bottom: 54px;
      }

      .hero-text,
      .profile-body p,
      .contact-copy {
        overflow-wrap: anywhere;
      }

      .hero-title {
        font-size: 38px;
      }

      .hero-readout,
      .project-highlight-list,
      .notes-grid,
      .contact-actions {
        grid-template-columns: 1fr;
      }

      .project-tile.featured {
        grid-column: auto;
      }

      .timeline-item {
        grid-template-columns: 1fr;
        gap: 5px;
      }

      .status-row {
        grid-template-columns: 1fr;
        gap: 2px;
      }

    }
  </style>
</head>
<body data-matrix-intro="home">
  <div class="page">

              <div class="status-row"><span class="skeleton-line short"></span><span class="skeleton-line long"></span></div>
            </div>
          </div>
        </div>
      </section>

      <section class="module reveal" id="projects">

      <section class="module reveal" id="notes">

            <span class="module-kicker" id="home-contact-kicker">Contact</span>

    <footer>

  <script src="scripts/site-content.js?v=20260611-home-live-2"></script>
