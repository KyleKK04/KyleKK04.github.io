<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="朱绪达 KyleKK 的经历、技能与当前方向。">
  <title>经历与技能 | 朱绪达 KyleKK</title>
  <meta property="og:title" content="经历与技能 | 朱绪达 KyleKK">
  <meta property="og:description" content="朱绪达 KyleKK 的游戏研发经历、Unity 技能栈、Game Jam 与玩法原型实践。">
  <meta property="og:url" content="https://kylekk.com/profile.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="styles/main.css?v=20260611-project-live">
  <style>
    body {
      background: #050505;
      line-height: 1.75;
    }

    .page {
      width: min(980px, calc(100% - 40px));
    }

    .profile-window {
      margin: 60px 0 54px;
    }

    .profile-window .window-body {
      padding: 32px;
    }

    .profile-meta {
      margin-bottom: 14px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
    }

    .profile-title {
      max-width: 820px;
      margin-bottom: 16px;
      font-size: 38px;
      line-height: 1.14;
      letter-spacing: -0.01em;
      overflow-wrap: anywhere;
      font-weight: 700;
    }

    .profile-summary {
      max-width: 760px;
      margin-bottom: 30px;
      color: var(--muted);
      font-size: 16px;
      overflow-wrap: anywhere;
    }

    .profile-page-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 24px;
      align-items: start;
    }

    .profile-page-grid > * {
      min-width: 0;
    }

    .profile-status {
      display: grid;
      gap: 10px;
      margin-bottom: 26px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(13, 17, 16, 0.56);
    }

    .profile-status-row {
      display: grid;
      grid-template-columns: minmax(64px, 92px) minmax(0, 1fr);
      gap: 12px;
      color: var(--text-dim);
      font-size: 13px;
    }

    .profile-status-row strong,
    .timeline-item time {
      color: var(--primary);
      font-weight: 800;
    }

    .profile-status-row span,
    .timeline-item p {
      overflow-wrap: anywhere;
    }

    .timeline {
      display: grid;
      gap: 12px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 22px;
      padding: 18px 0;
      border-top: 1px solid var(--border);
    }

    .timeline-item:first-child {
      border-top-color: rgba(83, 216, 140, 0.2);
    }

    .timeline-item h2 {
      margin-bottom: 5px;
      font-size: 19px;
      line-height: 1.25;
    }

    .timeline-item p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .skill-board {
      display: grid;
      gap: 12px;
    }

    .skill-group {
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(13, 17, 16, 0.58);
    }

    .skill-group-label {
      display: block;
      margin-bottom: 12px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (max-width: 920px) {
      .profile-page-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: 100%;
      }

      .profile-window .window-body {
        padding: 22px;
      }

      .profile-title {
        font-size: 28px;
      }

      .profile-status-row,
      .timeline-item {
        grid-template-columns: 1fr;
        gap: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="nav">
      <a class="logo" href="index.html" data-site-logo>KyleKK</a>
      <nav class="nav-links" aria-label="主导航">
        <a href="projects.html" data-nav-key="projects">Projects</a>
        <a class="active" href="profile.html" data-nav-key="profile">Profile</a>
        <a href="blog.html" data-nav-key="notes">Notes</a>
        <a href="contact.html" data-nav-key="contact">Contact</a>
      </nav>
    </header>

    <main>
      <article class="terminal-window profile-window" aria-labelledby="profile-title">
        <div class="window-header">
          <span class="window-dot red"></span>
          <span class="window-dot yellow"></span>
          <span class="window-dot green"></span>
          <span class="window-title" id="profile-window-title">profile.log</span>
        </div>
        <div class="window-body" id="profile-content"></div>
      </article>
    </main>

    <footer>
      <p>&copy; <span id="current-year"></span> 朱绪达 KyleKK</p>
    </footer>
  </div>

  <script src="scripts/site-content.js?v=20260612-subpage-speed-1"></script>
  <script src="scripts/profile-page.js?v=20260612-subpage-speed-1"></script>
</body>
</html>
