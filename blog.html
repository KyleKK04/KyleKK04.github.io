<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="朱绪达 KyleKK 的技术博客列表与文章阅读。">
  <title>技术博客 | 朱绪达 KyleKK</title>
  <meta property="og:title" content="技术博客 | 朱绪达 KyleKK">
  <meta property="og:description" content="朱绪达 KyleKK 的技术博客，记录游戏研发、Unity、玩法系统和工程实践的复盘与笔记。">
  <meta property="og:url" content="https://kylekk.com/blog.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="styles/main.css?v=20260611-blog-readability-3">
  <style>
    body {
      background:
        radial-gradient(circle at 15% 10%, rgba(83, 216, 140, 0.04), transparent 30rem),
        radial-gradient(circle at 80% 20%, rgba(111, 183, 214, 0.025), transparent 25rem),
        var(--bg);
      line-height: 1.75;
    }

    .page {
      width: min(920px, calc(100% - 40px));
    }

    .page-head {
      padding: 68px 0 36px;
    }

    .article-window {
      margin: 0 0 54px;
    }

    .article-window .window-body {
      padding: 38px 40px 42px;
    }

    .article-meta {
      margin-bottom: 14px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
    }

    .article-title {
      max-width: 820px;
      margin-bottom: 16px;
      font-size: 38px;
      line-height: 1.14;
      letter-spacing: -0.01em;
      overflow-wrap: anywhere;
      font-weight: 700;
    }

    .article-summary {
      max-width: 44em;
      margin-bottom: 24px;
      color: #d9e1de;
      font-size: 17px;
      line-height: 1.82;
      font-weight: 500;
    }

    .article-summary strong {
      color: #f4f7f6;
    }

    .post-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 0;
    }

    .post-option {
      display: block;
      padding: 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .post-option:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
      background: var(--panel-hover);
    }

    .post-option small {
      color: var(--primary);
      font-weight: 600;
      font-size: 12px;
    }

    .post-option h3 {
      margin-top: 8px;
      font-size: 18px;
      font-weight: 600;
    }

    .post-option p {
      margin-top: 7px;
      color: var(--text-dim);
      font-size: 13px;
      line-height: 1.6;
    }

    .reader-content .katex {
      color: #dfe7e3;
    }

    .reader-content .katex-display {
      margin: 1.2rem 0;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 0.15rem;
    }

    .article-window .mini-tag {
      color: #9df4bf;
      background: rgba(83, 216, 140, 0.18);
      border-color: rgba(83, 216, 140, 0.42);
      box-shadow: inset 0 0 0 1px rgba(83, 216, 140, 0.06);
    }

    .reader-content {
      max-width: 44em;
      color: #d6dfdb;
      font-size: 16px;
      line-height: 1.82;
    }

    .reader-content p,
    .reader-content ul,
    .reader-content ol,
    .reader-content li {
      color: #d2dbd7;
    }

    .reader-content p {
      margin: 16px 0;
    }

    .reader-content ul,
    .reader-content ol {
      margin: 16px 0 16px 26px;
    }

    .reader-content li {
      margin: 6px 0;
      padding-left: 2px;
    }

    .reader-content strong {
      color: #f5f7f6;
      font-weight: 700;
    }

    .reader-content h1,
    .reader-content h2,
    .reader-content h3 {
      max-width: 24em;
      margin-top: 34px;
      color: #f3f6f4;
    }

    .reader-content blockquote {
      color: #dce5e1;
      background: rgba(255, 255, 255, 0.025);
      border-left: 3px solid rgba(83, 216, 140, 0.72);
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
    }

    .post-option .post-tags {
      margin: 14px 0 0;
    }

    @media (max-width: 640px) {
      .article-window .window-body {
        padding: 22px;
      }

      .article-title {
        font-size: 28px;
      }

      .post-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="nav">
      <a class="logo" href="index.html" data-site-logo>KyleKK</a>
      <nav class="nav-links" aria-label="主导航">
        <a href="projects.html" data-nav-key="projects">Projects</a>
        <a href="profile.html" data-nav-key="profile">Profile</a>
        <a class="active" href="blog.html" data-nav-key="notes">Notes</a>
        <a href="contact.html" data-nav-key="contact">Contact</a>
      </nav>
    </header>

    <main>
      <article class="terminal-window article-window" id="article-shell">
        <div class="window-header">
          <span class="window-dot red"></span>
          <span class="window-dot yellow"></span>
          <span class="window-dot green"></span>
          <span class="window-title" id="window-title">posts.md</span>
        </div>
        <div class="window-body">
          <div class="article-meta" id="article-meta" style="display:none"></div>
          <h1 class="article-title" id="article-title">技术博客</h1>
          <p class="article-summary" id="article-summary">技术复盘、项目笔记和学习记录。</p>
          <div class="post-tags" id="article-tags"></div>
          <div class="reader-content" id="reader-content">
            <div class="post-list">
              <article class="post-option skeleton-card"></article>
              <article class="post-option skeleton-card"></article>
              <article class="post-option skeleton-card"></article>
              <article class="post-option skeleton-card"></article>
            </div>
          </div>
        </div>
      </article>
    </main>

    <footer>
      <p>&copy; <span id="current-year"></span> 朱绪达 KyleKK</p>
    </footer>
  </div>

  <script src="scripts/site-content.js?v=20260612-subpage-speed-1"></script>
  <script src="scripts/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script>
    document.querySelector("#current-year").textContent = new Date().getFullYear();

    const articleMeta = document.querySelector("#article-meta");
    const articleTitle = document.querySelector("#article-title");
    const articleSummary = document.querySelector("#article-summary");
    const articleTags = document.querySelector("#article-tags");
    const readerContent = document.querySelector("#reader-content");
    const windowTitle = document.querySelector("#window-title");
    let siteCopy = null;

    function renderReaderSkeleton() {
      return `
        <div class="skeleton-text-group">
          <span class="skeleton-line long"></span>
          <span class="skeleton-line long"></span>
          <span class="skeleton-line medium"></span>
          <span class="skeleton-line long"></span>
          <span class="skeleton-line short"></span>
        </div>
      `;
    }

    function renderArticleHtml(markdown, title) {
      readerContent.innerHTML = MarkdownParser.toHtml(markdown, title);

      if (typeof renderMathInElement === "function") {
        renderMathInElement(readerContent, {
          throwOnError: false,
          delimiters: [
            { left: "$$", right: "$$", display: true },
            { left: "$", right: "$", display: false }
          ]
        });
      }
    }

    function renderInlineMarkdown(target, markdown) {
      target.innerHTML = MarkdownParser.renderInline(markdown || "");

      if (typeof renderMathInElement === "function") {
        renderMathInElement(target, {
          throwOnError: false,
          delimiters: [
            { left: "$$", right: "$$", display: true },
            { left: "$", right: "$", display: false }
          ]
        });
      }
    }

    function renderPostChoices(posts) {
      const blogPage = siteCopy?.blogPage || {};
      SiteContent.applyMeta({
        title: blogPage.title || "技术博客 | 朱绪达 KyleKK",
        description: blogPage.metaDescription || "朱绪达 KyleKK 的技术博客列表与文章阅读。",
        ogTitle: blogPage.ogTitle || "技术博客 | 朱绪达 KyleKK",
        ogDescription: blogPage.ogDescription || "朱绪达 KyleKK 的技术博客，记录游戏研发、Unity、玩法系统和工程实践的复盘与笔记。",
        ogUrl: "https://kylekk.com/blog.html"
      });
      windowTitle.textContent = blogPage.windowTitle || "posts.md";
      articleMeta.textContent = "";
      articleMeta.style.display = "none";
      articleTitle.textContent = blogPage.listTitle || "技术博客";
      renderInlineMarkdown(articleSummary, blogPage.listSummary || "技术复盘、项目笔记和学习记录。");
      articleTags.innerHTML = "";
      readerContent.innerHTML = `
        <div class="post-list">
          ${posts.map(post => `
            <a class="post-option" href="blog.html?post=${encodeURIComponent(post.slug)}">
              <small>${post.date}</small>
              <h3>${post.title}</h3>
              <p>${MarkdownParser.renderInline(post.summary || "")}</p>
              <div class="post-tags">
                ${post.tags.map(tag => `<span class="mini-tag">${SiteContent.escapeHtml(tag)}</span>`).join("")}
              </div>
            </a>
          `).join("")}
        </div>
      `;
    }

    async function loadArticle() {
      try {
        siteCopy = await SiteContent.fetchJson("content/site.json");
        SiteContent.applyNavigation(siteCopy);
        SiteContent.applyTheme(siteCopy);
        const posts = await SiteContent.fetchPosts();
        const slug = new URLSearchParams(window.location.search).get("post");

        if (!slug) {
          renderPostChoices(posts);
          return;
        }

        const post = posts.find(item => item.slug === slug);
        if (!post) {
          const blogPage = siteCopy.blogPage || {};
          articleMeta.style.display = "block";
          windowTitle.textContent = "404.log";
          articleMeta.textContent = blogPage.notFoundMeta || "Not Found";
          articleTitle.textContent = blogPage.notFoundTitle || "没有找到这篇文章";
          renderInlineMarkdown(articleSummary, blogPage.notFoundSummary || "可以返回博客列表重新选择一篇文章。");
          articleTags.innerHTML = "";
          readerContent.innerHTML = `<a class="post-link" href="blog.html">${SiteContent.escapeHtml(blogPage.notFoundBackLabel || "返回博客列表")}</a>`;
          return;
        }

        const ownerName = siteCopy.ownerName || "朱绪达 KyleKK";
        SiteContent.applyMeta({
          title: `${post.title} | ${ownerName}`,
          description: post.summary,
          ogTitle: `${post.title} | ${ownerName}`,
          ogDescription: post.summary,
          ogUrl: `https://kylekk.com/blog.html?post=${encodeURIComponent(post.slug)}`
        });
        articleMeta.style.display = "block";
        windowTitle.textContent = post.slug + ".md";
        articleMeta.textContent = post.date;
        articleTitle.textContent = post.title;
        renderInlineMarkdown(articleSummary, post.summary || "");
        articleTags.innerHTML = post.tags.map(tag => `<span class="mini-tag">${SiteContent.escapeHtml(tag)}</span>`).join("");
        readerContent.innerHTML = renderReaderSkeleton();

        if (post.body) {
          renderArticleHtml(post.body, post.title);
          return;
        }

        const markdownResponse = await fetch(post.file, { cache: "no-cache" });
        if (!markdownResponse.ok) {
          throw new Error(`HTTP ${markdownResponse.status}`);
        }
        const markdown = await markdownResponse.text();
        const parsed = SiteContent.parseMarkdownEntry(markdown);
        renderArticleHtml(parsed.body || markdown, post.title);
      } catch (error) {
        const blogPage = siteCopy?.blogPage || {};
        articleMeta.style.display = "block";
        windowTitle.textContent = "error.log";
        articleMeta.textContent = blogPage.loadErrorMeta || "Error";
        articleTitle.textContent = blogPage.loadErrorTitle || "文章暂时无法加载";
        articleSummary.textContent = "";
        articleTags.innerHTML = "";
        readerContent.innerHTML = `<p>${SiteContent.escapeHtml(blogPage.loadErrorMessage || "请确认本地预览是通过 HTTP 服务打开，并检查 posts/index.json 与 Markdown 文件路径。")}</p>`;
      }
    }

    loadArticle();
  </script>
</body>
</html>
