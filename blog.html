  <script>
    document.querySelector("#current-year").textContent = new Date().getFullYear();
    const windowTitle = document.querySelector("#window-title");
    const pageSnapshot = SiteContent.readEmbeddedJson("blog-page-snapshot");

    function applyBlogChrome(site) {
      const blogPage = site?.blogPage || {};
      SiteContent.applyNavigation(site);
      SiteContent.applyTheme(site);
      SiteContent.applyMeta({
        title: blogPage.title || "技术博客 | KyleKK",
        description: blogPage.metaDescription || "KyleKK 的技术博客列表与文章阅读。",

        ogUrl: "https://kylekk.com/blog.html"
      });
      windowTitle.textContent = blogPage.windowTitle || "posts.md";
    }

    async function initBlogPage() {
      if (pageSnapshot?.site) {
        applyBlogChrome(pageSnapshot.site);
        return;
      }

      try {
        const site = await SiteContent.fetchJson("content/site.json");
        applyBlogChrome(site);
      } catch (_error) {
        // Keep static HTML as fallback.
      }
    }

    initBlogPage();
